services:
  sqs:
    image: ghetto-sqs
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: ghetto-sqs
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      PORT: ${PORT}
    env_file:
      - .env
    command: >
      bash -c 'npx prisma db push && npm start'
    networks:
      gsqs-host-access:
        aliases:
          - sqs
      mongo-host-access: {}

networks:
  gsqs-host-access:
    name: gsqs-host-access
    driver: bridge
  mongo-host-access:
    external: true
    name: mongo-host-access
