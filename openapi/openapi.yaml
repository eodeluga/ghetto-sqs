openapi: 3.1.0
info:
  title: Ghetto SQS API
  version: 0.0.1
  summary: Lightweight SQS-compatible queue API with authless send, receive, delete, and visibility operations
servers:
  - url: http://localhost:3000
tags:
  - name: System
  - name: Queues
paths:
  /:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /health:
    get:
      tags:
        - System
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /health/live:
    get:
      tags:
        - System
      summary: Liveness check
      responses:
        '200':
          description: Service process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /health/ready:
    get:
      tags:
        - System
      summary: Readiness check with dependency validation
      responses:
        '200':
          description: Service dependencies are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemReadinessResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/queues/{queueName}/messages:
    post:
      tags:
        - Queues
      summary: Send a message to a queue
      parameters:
        - $ref: '#/components/parameters/QueueNamePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnqueueMessageRequest'
      responses:
        '201':
          description: Message accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnqueueMessageResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags:
        - Queues
      summary: Delete a message with an active receipt handle
      parameters:
        - $ref: '#/components/parameters/QueueNamePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteMessageRequest'
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMessageResponse'
        '400':
          description: Receipt handle is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/queues/{queueName}/messages/receive:
    get:
      tags:
        - Queues
      summary: Receive visible messages
      parameters:
        - $ref: '#/components/parameters/QueueNamePath'
        - $ref: '#/components/parameters/MaxMessagesQuery'
        - $ref: '#/components/parameters/VisibilityTimeoutQuery'
      responses:
        '200':
          description: Messages received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiveMessagesResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/queues/{queueName}/messages/visibility:
    post:
      tags:
        - Queues
      summary: Change visibility timeout using an active receipt handle
      parameters:
        - $ref: '#/components/parameters/QueueNamePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeMessageVisibilityRequest'
      responses:
        '200':
          description: Visibility updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeMessageVisibilityResponse'
        '400':
          description: Receipt handle is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  parameters:
    MaxMessagesQuery:
      in: query
      name: maxMessages
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 10
        default: 1
    QueueNamePath:
      in: path
      name: queueName
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 80
        pattern: '^[A-Za-z0-9._-]+$'
    VisibilityTimeoutQuery:
      in: query
      name: visibilityTimeoutSeconds
      required: false
      description: Visibility timeout to apply to returned messages.
      schema:
        type: integer
        minimum: 0
        maximum: 43200
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailableErrorResponse:
      description: Service dependencies are not ready
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ChangeMessageVisibilityRequest:
      type: object
      additionalProperties: false
      required:
        - receiptHandle
        - visibilityTimeoutSeconds
      properties:
        receiptHandle:
          type: string
          minLength: 1
        visibilityTimeoutSeconds:
          type: integer
          minimum: 0
          maximum: 43200
    ChangeMessageVisibilityResponse:
      type: object
      additionalProperties: false
      required:
        - messageId
        - visibleAt
      properties:
        messageId:
          type: string
          minLength: 1
        visibleAt:
          type: string
          format: date-time
    DeleteMessageRequest:
      type: object
      additionalProperties: false
      required:
        - receiptHandle
      properties:
        receiptHandle:
          type: string
          minLength: 1
    DeleteMessageResponse:
      type: object
      additionalProperties: false
      required:
        - deleted
      properties:
        deleted:
          type: boolean
          enum:
            - true
    EnqueueMessageRequest:
      type: object
      additionalProperties: false
      required:
        - body
      properties:
        body:
          description: Message payload
        deadLetterQueueName:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[A-Za-z0-9._-]+$'
        delaySeconds:
          type: integer
          minimum: 0
          maximum: 900
          default: 0
        maxReceiveCount:
          type: integer
          minimum: 1
          maximum: 1000
        messageDeduplicationId:
          type: string
          minLength: 1
          maxLength: 128
        messageGroupId:
          type: string
          minLength: 1
          maxLength: 128
    EnqueueMessageResponse:
      type: object
      additionalProperties: false
      required:
        - deduplicated
        - messageId
        - queueName
        - visibleAt
      properties:
        deduplicated:
          type: boolean
        messageId:
          type: string
          minLength: 1
        queueName:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[A-Za-z0-9._-]+$'
        visibleAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          minLength: 1
        details:
          description: Optional structured error details
        message:
          type: string
          minLength: 1
        requestId:
          type: string
          minLength: 1
    ReceivedMessage:
      type: object
      additionalProperties: false
      required:
        - approximateReceiveCount
        - body
        - messageId
        - queueName
        - receiptHandle
        - visibilityExpiresAt
      properties:
        approximateReceiveCount:
          type: integer
          minimum: 1
        body:
          description: Message payload
        messageGroupId:
          type: string
          minLength: 1
          maxLength: 128
        messageId:
          type: string
          minLength: 1
        queueName:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[A-Za-z0-9._-]+$'
        receiptHandle:
          type: string
          minLength: 1
        visibilityExpiresAt:
          type: string
          format: date-time
    ReceiveMessagesResponse:
      type: object
      additionalProperties: false
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ReceivedMessage'
    SystemHealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    SystemReadinessResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ready
            - not_ready
